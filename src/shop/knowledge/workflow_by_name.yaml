抽奖活动:
  name: 抽奖活动
  description: 因为是奖品,所以中奖的member_order虽然有消费记录,包括point_consum,point_consum_detail,journal_account.
    但对应的积分都是0,订单的total_price也是0
  tables:
  - activity
  - activity_goods
  - activity_item
  - banner
  table_conditions:
    activity: 抽奖活动主表
    activity_goods: 抽奖活动奖品表,包括activity_level:奖品等级,goods_id可关联goods_info_new_test.goods_id获取奖品对应的商品信息
    activity_item: '抽奖活动资格表

      member_id可关联members获取资格所属的用户;

      dealer_id可关联dealers获取资格所属的经销商;

      activity_level不为NULL时表示中奖;

      activity_level可通过activity_item.activity_id = activity_goods.activity_id and
      activity_item.activity_level=activity_goods.activity_level 找到对应的奖品

      deleted_at不为NULL表示抽奖资格失效, deleted_at是失效时间

      order_id中奖后生成的奖品订单, 可关联member_order.id 获取相信订单的信息

      created_at为得到抽奖资格时间

      抽奖资格对应订单:

      1. activity_order_id, 当activity_id in (1,6,7)时可直接关联member_order.id获取资格对应的订单信息

      2. activity_order_id, 当activity_id in (2,3,4)时可通过activity_order.id = member_order_main.main_order_id
      获取组合订单表, 然后通过member_order_main.order_id = member_order.id获取对应订单.注意此时会有多条member_order

      3. 如果activity存在,并且activity_id>7时, 需要先查询一条对应的activity_item, 然后判断activity_order_id
      是否<1亿. 小于时直接关联member_order, 大于时使用第2条关联

      lottery_at表示抽奖时间,注意抽奖不代表一定中奖

      status: 0 未抽中 1 可抽奖 2中奖待确认收货地址 3中奖已确认; 2时代表未生成中奖订单, 3表示地址已确认,已生成中奖订单'
    banner: activity.id>1时会有对应的banner显示在前端, 可通过banner.additional=concat('[', activity.id,
      ']')来拿到对应的banner信息, 可加上banner.type=6过滤banner
前端活动排序:
  name: 前端活动排序
  description: 活动排序指的是banner,秒杀(on_sale),host_main在前端显示顺序
  tables:
  - activity_sort
  table_conditions:
    activity_sort: 'type=1是商品详情页面排序

      type=2是活动页面排序

      注意数据库中的排序并不准确, 实际需要通过  select * from banner where status = 1 and del_flag =
      0 order by id desc 获取当前生效的banner, 然后根据activity_sort的id顺序排序, 然后每一条做校验

      如果activity_type=1,则是on_sale, 可只查询id=1的on_sale显示

      如果activity_type=3,则是hot_main, 可只查询id=1的hot_main显示

      如果activity_type=4, 则是banner, 需要判断此时的activity_id是否在生效的banner里, 如果不在跳过, 如果在显示.

      当遍例完activity_sort后, 确认是否还有未生效的banner 如果有则按顺序加到返回结果里'
后台用户通知:
  name: 后台用户通知
  description: '比亚迪结算提示,供应商无上架商品提示,人工待处理订单提示,自营商品无货

    以上四种会通知部分后台用户'
  tables:
  - admin_user_notice
  table_conditions:
    admin_user_notice: 'type=0: 比亚迪结算提示

      type=1: 供应商无上架商品提示

      type=2: 人工待处理订单提示

      type=3: 自营商品无货


      status=0表示未读,1表示已读

      created_at表示通知时间

      updated_at在status=1时表示读通知时间

      可通过user_id关联到mall_admin_user.id 获取相关后台用户信息'
经销商合同:
  name: 经销商合同
  description: 经销商先上传合同,审核通过后更新经销商状态
  tables:
  - agreement
  - mall_admin_user
  - import_file
  - dealers
  table_conditions:
    agreement: 'dealer_id 可关联到dealers.id,获取合同所属经销商信息

      end_at表示合同到期时间

      back_user_id 合同上传人, 可通过mall_admin_user.id关联到上传人信息

      back_at表示合同文件上传时间

      confirm_user_id合同确认人, 可通过mall_admin_user.id关联到确认人信息

      confirm_at确认时间

      file_id 非必要不要使用, 可通过此字段关联到import_file.id 获取file_name 与 content(base64的文件).

      type: 0未确认1已确认2过期3拒收4合约到期

      created_at: 忽略这个字段

      company_id:可使用这个字段查询公司的合同. 只为查询用, 因为dealers也有company_id

      reason_of_rejection: 合同的拒收原因'
    mall_admin_user: 关联agreement的 back_user_id合同上传人, confirm_user_id合同确认人
    import_file: 可通过agreement的file_id获取到上传文件名与文件(content字段,base64结构数据), 注意些表不要Join,
      只允许通过id查询
    dealers: 经销商表,agreement与dealers是多对一的关系. agreement影响dealers的signed字段
充许上传的文件:
  name: 充许上传的文件
  description: 通过allow_file确认用户可上传的文件格式
  tables:
  - allow_file
  table_conditions: {}
区域,大区,小区:
  name: 区域,大区,小区
  description: '经销商所属的大区与小区.

    注意当查询members会员,member_order订单, point_recharge_detail所属大区小区时都需要先关联dealers, 然后通过dealers表说明进行区域的关联'
  tables:
  - area
  - company
  - dealers
  table_conditions:
    area: 区域表,注意此表是2层结构,parent_id=0表示大区;不为0表示小区,此时parent_id表示对应的大区id
    company: area属于company
    dealers: "经销商属于area,注意经销商可能直属于大区,也可能属于一个小区. 所以在查询经销商所属大区与小区时可参考\nselect a.sale_code,\
      \ case when b.parent_id = 0 then b.name else c.name end as `大区`, case when b.parent_id\
      \ = 0 then '' else b.name end as `小区`\n from dealers as a\n join area as b on\
      \ a.area_id = b.id\n left join area as c on c.id = b.parent_id"
banner:
  name: banner
  description: '一种活动, 分为:

    type=1静态页;type=2商品详情;type=3商品专区;type=4加购;type=6抽奖活动;type=7商品聚合页'
  tables:
  - banner
  - activity
  - banner_add_on_item
  - banner_company
  - banner_goods_detail
  - goods_info_new_test
  - banner_on_off_record
  - banner_on_off_record_item
  - banner_out_goods
  - banner_stock_sms_mobile
  - coupon_activity
  - order_item_in_activity
  - member_order
  - goods_selection
  - goods_selection_detail
  - channel_activity_goods
  - goods_addition
  table_conditions:
    banner: 'name是banner的名称

      status是banner状态 0表示下线1表示上线

      type表示类型,参考说明

      sort表示banner在主页的显示顺序

      banner_url表示主页的显示图片地址

      redirect_url表示前端点击后的跳转地址, 注意当type=2时表示的是商品goods_id, 可通过banner.redirect_url=goods_info_new_test获取商品信息

      start_at,end_at表示banner活动的开始与结束时间

      discount_price, type=2时生效,表示商品的折扣价

      del_flag 软删除 查询时应该只查询del_flag=0的banner'
    activity: 'type=6时生效, 可通过banner.additional = concat(''['', activity.id, '']'')关联,
      或者取出 banner的additional,json集合结构: [activity.id], 取出对应的activity.id'
    banner_add_on_item: 'type=4时保存对应的加购商品信息 goods_id表示主商品, on_item_id表示加购商品信息;

      通过banner_add_on_item.banner_id=banner.id关联

      deleted_at表示删除时间'
    banner_company: '表示banner与公司company的关系. 如果没有对应的记录则相关公司不参予此banner活动

      banner_id=banner.id

      company_id=company.id'
    banner_goods_detail: "type=2,3,7时生效, 保存banner里的商品信息 \nbanner_id=banner.id\n可通过goods_id关联goods_info_new_test.goods_id获取商品信息.\n\
      注意此时price表示商品售价, sell_price表示原价, 价格不可使用goods_info_new里的价格"
    goods_info_new_test: 可通过banner_add_on_item,banner_goods_detail关联商品信息, 需要注意价格,
      优先使用banner_add_on_item与 banner_goods_detail里的价格
    banner_on_off_record: 'banner的上下线与更新记录

      category: 0 banner上下架, 1 更新banner商品

      type: 0下架1上架

      可通过banner_id=banner.id 获取到这些信息

      user_id操作用户 关联mall_admin_user.id 可获取到操作人的信息

      created_at表示操作时间'
    banner_on_off_record_item: '可通过record_id=banner_on_off_record.id获取到;记录操作详细内容

      category=0时表示banner与公司company的关系, 对应company_id=company.id

      category=1时表示banner与商品的关系, 对应goods_id=goods_info_new_test.id'
    banner_out_goods: 定时任务记录banner中下架或无库存的商品, 用于发送商品低库存报警短信筛选商品, 只用于发送短信
    banner_stock_sms_mobile: 发送低库存报警短信的配置, 里面配置了手机号
    coupon_activity: 优惠券红包配置可使用的banner, 所以banner里的商品可使用对应的优惠券红包. coupon_activity.activity_id=banner.id
    order_item_in_activity: "记录banner与订单的关系category=1时activity_id=banner.id, order_id可关联member_order.id获取订单信息,\
      \ order_id+goods_id可关联member_order_item.order_id与goods_id. \n需要注意此表里的数据category=1时才是banner;\
      \  price表示使用优惠券后的价格"
    member_order: '可通过order_item_in_activity查询到订单信息

      add_item_id不为null表示是加购订单时可关联到member_order_item.id查询到加购主订单里的子订单

      add_on_item_id加购订单对应的banner_add_on_item.id'
    goods_selection: 选品, banner的商品只能通过选品选择, 可通过banner.id=goods_selection.banner_id查询到选品主表
    goods_selection_detail: 选品详情表, selection_id=goods_selection.id, 此表记录选品的商品信息, 可通过goods_id=goods_info_new_test.goods_id关联商品信息.
    channel_activity_goods: '生效中的banner并且有京东商品时会记录生效时京东商品的成本价,配送方式与商品名称.发生变化时显示变化

      不直接关联banner,需要banner下属的商品通过goods_id进行关联'
    goods_addition: banner下的商品的划线价,原价. 可通过banner_goods_detail.goods_id=goods_addition.goods_id查询到;上线的banner可用
