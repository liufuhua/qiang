      origin_rule_id=category_on_sale_rule.id 可获取到当前生效的配置规则'
    category_on_sale_rule_brand_his: 'category_on_sale_rule_his的多个品牌配置

      rule_id=category_on_sale_rule_his.id

      category_id可关联goods_category_test.id

      brand_id=banner.id, 非必要不需要关联, 品牌名可直接通过brand_name获取品牌名'
